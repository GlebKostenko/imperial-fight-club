services:
  mongo:
    image: mongo:6
    container_name: apex-mongo
    restart: unless-stopped
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    environment:
      MONGO_INITDB_DATABASE: apex-fight-club
    volumes:
      - mongo_data:/data/db
    networks:
      - apex-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: apex-server
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/apex-fight-club
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    volumes:
      - ./public:/app/public:ro
      - ./admin:/app/admin:ro
      - ./server/uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - apex-network

  nginx:
    image: nginx:alpine
    container_name: apex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/usr/share/nginx/html:ro
      - ./admin:/usr/share/nginx/admin:ro
      - ./server/uploads:/usr/share/nginx/uploads:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - server
    networks:
      - apex-network

volumes:
  mongo_data:

networks:
  apex-network:
    driver: bridge
